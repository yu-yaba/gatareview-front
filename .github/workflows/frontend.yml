name: "gatareview-front CI"

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_ENV: http://127.0.0.1:3001
      NEXTAUTH_URL: http://127.0.0.1:8080
      NEXTAUTH_SECRET: ci-nextauth-secret
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ci-recaptcha-site-key
      NEXT_PUBLIC_GA_ID: ""
      DOCKER_BACKEND_URL: http://127.0.0.1:3001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend verify
        run: npm run verify
